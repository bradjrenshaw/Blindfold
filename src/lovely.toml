# Blindfold — Lovely patch manifest.
# Registers the mod's Lua as requireable modules, then boots it once the
# Controller exists. No Steamodded dependency — Lovely only.

# The version below is stamped by scripts\build_release.ps1 -Version — don't
# edit it by hand.
[manifest]
version = "1.0.3"
priority = 0

# --- Register mod Lua as requireable modules. Lovely does NOT add the mod
#     folder to the require path, so every file we `require` needs a module
#     patch with an explicit name.
[[patches]]
[patches.module]
source = "speech.lua"
before = "main.lua"
name = "blindfold_speech"

[[patches]]
[patches.module]
source = "core.lua"
before = "main.lua"
name = "blindfold"

# --- Boot once, immediately after the Controller is created in Game:start_up.
#     At this point G, Card, localize, etc. all exist.
[[patches]]
[patches.pattern]
target = "game.lua"
pattern = "self.CONTROLLER = Controller()"
position = "after"
payload = "require('blindfold')"
match_indent = true
times = 1

# --- Inject a "Blindfold" tab into the game's Options screen.
[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = "local t = create_UIBox_generic_options({back_func = 'options',contents = {create_tabs("
position = "before"
payload = "if _G.Blindfold and _G.Blindfold.settings_tab then tabs[#tabs+1] = {label = 'Blindfold', tab_definition_function = function() return _G.Blindfold.settings_tab() end} end"
match_indent = true
times = 1
